<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Appartement T3 Biarritz — TrackerImmo (Mobile)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
/* ============================================================
   MOBILE PAGE BIEN — STANDALONE PROTOTYPE
   Max-width 430px for realistic mobile preview.
   ============================================================ */
body {
  max-width: 430px;
  margin: 0 auto;
  background: var(--bg-page);
  padding-bottom: var(--space-5xl); /* 80px — space for bottom bar */
}

/* ---- HEADER OVERRIDE (mobile) ---- */
/* shared.css @media <=768 sets height:48px — we match that here */
.top-bar {
  padding: 0 var(--space-md);
  height: 48px;
}
.top-bar__logo { height: 28px; }
.top-bar__inner {
  justify-content: space-between;
}

/* Back button in header */
.top-bar__back {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  text-decoration: none;
  flex-shrink: 0;
}
.top-bar__back svg {
  width: 16px;
  height: 16px;
  color: var(--text-secondary);
}

/* ============================================================
   WOW BANNER — ephemeral, scrolls with content
   ============================================================ */
.wow-banner {
  background: var(--bg-section);
  border-bottom: 1px solid var(--border-default);
  padding: var(--space-sm) var(--space-md);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 18px;
}
.wow-banner__icon {
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  color: var(--primary-dark);
}
.wow-banner__count {
  font-weight: 700;
  color: var(--primary-dark);
}
.wow-banner__range {
  font-weight: 600;
  color: var(--text-heading);
}

/* ============================================================
   AGENCY SELECTOR — Trivago-style hierarchical
   Premium = rich card, others = compact rows
   ============================================================ */
.agency-selector {
  background: var(--bg-section);
  padding: var(--space-sm) var(--space-md);
  border-bottom: 1px solid var(--border-default);
}

/* Premium featured card — compact */
.selector-premium {
  background: var(--bg-premium);
  border: 1.5px solid var(--border-default);
  border-radius: var(--radius-card-lg);
  padding: var(--space-sm) var(--space-md);
  cursor: pointer;
  transition: border-color 0.2s;
}
.selector-premium.active {
  border-color: var(--border-premium-active);
}
.selector-premium__header {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-xs);
}
.selector-premium__avatar {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-full);
  overflow: hidden;
  flex-shrink: 0;
}
.selector-premium__avatar svg { width: 100%; height: 100%; }
.selector-premium__info { flex: 1; min-width: 0; }
.selector-premium__name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-heading);
  display: flex;
  align-items: center;
  gap: var(--space-xs);
}
.selector-premium__name svg { width: 12px; height: 12px; flex-shrink: 0; }
.selector-premium__label {
  font-size: 10px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 3px;
}
.selector-premium__label svg { width: 9px; height: 9px; }
.selector-premium__data {
  display: flex;
  align-items: baseline;
  gap: var(--space-sm);
  margin-bottom: var(--space-xs);
}
.selector-premium__price {
  font-size: 15px;
  font-weight: 700;
  color: var(--primary-dark);
}
.selector-premium__meta {
  font-size: 11px;
  color: var(--text-tertiary);
}
.selector-premium__tags {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-xs);
}
.selector-premium__tags .reassurance-tag {
  font-size: 10px;
  padding: 2px 6px;
}

/* Other agencies — compact rows */
.selector-others {
  margin-top: var(--space-xs);
}
.selector-others__toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-xs) 0;
  cursor: pointer;
  user-select: none;
}
.selector-others__toggle-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
}
.selector-others__toggle-chevron {
  width: 16px;
  height: 16px;
  color: var(--text-label);
  transition: transform 0.2s;
}
.selector-others__toggle.open .selector-others__toggle-chevron {
  transform: rotate(180deg);
}
.selector-others__list {
  display: none;
  flex-direction: column;
  gap: 0;
  overflow: hidden;
}
.selector-others__list.open {
  display: flex;
}
/* Remove adjacent sibling dependency — toggle and list use independent .open classes */

/* Individual compact row */
.selector-row {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-xs);
  border-radius: var(--radius-card);
  cursor: pointer;
  transition: background 0.15s;
  border: 1.5px solid transparent;
}
.selector-row:active { background: rgba(0,0,0,0.03); }
.selector-row.active {
  background: rgba(14,78,87,0.04);
  border-color: var(--border-active);
}
.selector-row__avatar {
  width: 24px;
  height: 24px;
  border-radius: var(--radius-full);
  overflow: hidden;
  flex-shrink: 0;
}
.selector-row__avatar svg { width: 100%; height: 100%; }
.selector-row__name {
  flex: 1;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-heading);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.selector-row__price {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-heading);
  white-space: nowrap;
}
.selector-row__photos {
  font-size: 10px;
  color: var(--text-tertiary);
  white-space: nowrap;
}

/* Mono-agence banner variant */
.mono-banner {
  background: var(--bg-section);
  border-bottom: 1px solid var(--border-default);
  padding: var(--space-sm) var(--space-md);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}
.mono-banner__avatar {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-full);
  overflow: hidden;
  flex-shrink: 0;
}
.mono-banner__avatar svg { width: 100%; height: 100%; }
.mono-banner__text {
  font-size: 13px;
  color: var(--text-secondary);
}
.mono-banner__name {
  font-weight: 600;
  color: var(--text-heading);
}

/* ============================================================
   GALLERY — edge-to-edge, swipe, no arrows
   ============================================================ */
.m-gallery {
  position: relative;
  width: 100%;
  overflow: hidden;
  background: var(--border-default);
}
.m-gallery__track {
  display: flex;
  transition: transform 0.3s ease;
  will-change: transform;
}
.m-gallery__slide {
  flex: 0 0 100%;
  aspect-ratio: 16/10;
}
.m-gallery__slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  -webkit-user-drag: none;
  pointer-events: none;
}
.m-gallery__count {
  position: absolute;
  top: var(--space-sm);
  right: var(--space-sm);
  z-index: 5;
  background: rgba(0,0,0,0.55);
  color: white;
  padding: var(--space-xs) var(--space-sm);
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 600;
}
.m-gallery__dots {
  position: absolute;
  bottom: var(--space-sm);
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  display: flex;
  gap: var(--space-xs);
}
.m-gallery__dot {
  width: 6px;
  height: 6px;
  border-radius: var(--radius-full);
  background: rgba(255,255,255,0.45);
  border: none;
  padding: 0;
  transition: background 0.2s, transform 0.2s;
}
.m-gallery__dot.active {
  background: white;
  transform: scale(1.3);
}

/* ============================================================
   CONTENT SECTIONS
   ============================================================ */
.m-content {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
  padding: var(--space-md);
}

/* Quick view */
.m-quick {
  background: var(--bg-section);
  border-radius: var(--radius-card);
  padding: var(--space-md);
  box-shadow: var(--shadow-sm);
}
.m-quick__title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-heading);
  letter-spacing: -0.5px;
  margin-bottom: 2px;
}
.m-quick__address {
  font-size: 13px;
  color: var(--text-tertiary);
  margin-bottom: var(--space-sm);
}
.m-quick__price-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: var(--space-sm);
}
.m-quick__price-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-label);
}
.m-quick__price {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-heading);
  letter-spacing: -0.5px;
}
.m-quick__specs {
  display: flex;
  gap: var(--space-md);
  flex-wrap: wrap;
  align-items: center;
}
.m-quick__spec {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  font-size: 14px;
  color: var(--text-secondary);
}
.m-quick__spec svg { width: 15px; height: 15px; flex-shrink: 0; }

/* Description */
.m-desc {
  background: var(--bg-section);
  border-radius: var(--radius-card);
  padding: var(--space-md);
  box-shadow: var(--shadow-sm);
}
.m-desc__label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-label);
  margin-bottom: var(--space-sm);
}
.m-desc__text {
  font-size: 15px;
  line-height: 24px;
  color: var(--text-body);
}
.m-desc__text.truncated {
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.m-desc__toggle {
  display: inline-block;
  margin-top: var(--space-xs);
  font-size: 13px;
  font-weight: 600;
  color: var(--primary-dark);
  cursor: pointer;
}

/* Characteristics */
.m-chars {
  background: var(--bg-section);
  border-radius: var(--radius-card);
  padding: var(--space-md);
  box-shadow: var(--shadow-sm);
}
.m-chars__label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-label);
  margin-bottom: var(--space-sm);
}
.m-chars__grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
}
.m-char-item {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: var(--space-sm) 0;
  border-bottom: 1px solid var(--border-default);
}
.m-char-item:last-child { border-bottom: none; }
.m-char-item__key { color: var(--text-secondary); }
.m-char-item__val { font-weight: 600; color: var(--text-heading); }

/* Diagnostic DPE/GES */
.m-diag {
  background: var(--bg-section);
  border-radius: var(--radius-card);
  padding: var(--space-md);
  box-shadow: var(--shadow-sm);
}
.m-diag__label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-label);
  margin-bottom: var(--space-md);
}
.m-diag__container {
  display: flex;
  flex-direction: column;
  gap: var(--space-lg);
}
.m-diag-block__title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-heading);
  margin-bottom: var(--space-sm);
}
.m-diag-block__subtitle {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-bottom: var(--space-sm);
}
.m-diag-scale { display: flex; flex-direction: column; gap: 2px; }
.m-diag-bar { display: flex; align-items: center; height: 22px; }
.m-diag-bar__fill {
  height: 100%;
  border-radius: 3px 0 0 3px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 5px;
  font-size: 10px;
  font-weight: 700;
  color: white;
  position: relative;
}
.m-diag-bar__fill::after {
  content: '';
  position: absolute;
  right: -7px;
  top: 0;
  border-top: 11px solid transparent;
  border-bottom: 11px solid transparent;
  border-left: 7px solid currentColor;
}
.m-diag-bar.active .m-diag-bar__fill { font-size: 12px; }
.m-diag-bar.active .m-diag-bar__marker {
  display: flex;
  align-items: center;
  margin-left: 12px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-heading);
  white-space: nowrap;
}
.m-diag-bar__marker { display: none; }
/* DPE widths */
.m-diag-bar[data-grade="A"] .m-diag-bar__fill { width: 20%; background: var(--dpe-a); }
.m-diag-bar[data-grade="B"] .m-diag-bar__fill { width: 30%; background: var(--dpe-b); }
.m-diag-bar[data-grade="C"] .m-diag-bar__fill { width: 40%; background: var(--dpe-c); color: var(--text-body); }
.m-diag-bar[data-grade="D"] .m-diag-bar__fill { width: 50%; background: var(--dpe-d); color: var(--text-body); }
.m-diag-bar[data-grade="E"] .m-diag-bar__fill { width: 60%; background: var(--dpe-e); color: var(--text-body); }
.m-diag-bar[data-grade="F"] .m-diag-bar__fill { width: 75%; background: var(--dpe-f); }
.m-diag-bar[data-grade="G"] .m-diag-bar__fill { width: 90%; background: var(--dpe-g); }
.m-diag-bar[data-grade="A"] .m-diag-bar__fill::after { border-left-color: var(--dpe-a); }
.m-diag-bar[data-grade="B"] .m-diag-bar__fill::after { border-left-color: var(--dpe-b); }
.m-diag-bar[data-grade="C"] .m-diag-bar__fill::after { border-left-color: var(--dpe-c); }
.m-diag-bar[data-grade="D"] .m-diag-bar__fill::after { border-left-color: var(--dpe-d); }
.m-diag-bar[data-grade="E"] .m-diag-bar__fill::after { border-left-color: var(--dpe-e); }
.m-diag-bar[data-grade="F"] .m-diag-bar__fill::after { border-left-color: var(--dpe-f); }
.m-diag-bar[data-grade="G"] .m-diag-bar__fill::after { border-left-color: var(--dpe-g); }
.m-diag-block--ges .m-diag-bar[data-grade="A"] .m-diag-bar__fill { background: var(--ges-a); color: var(--text-body); }
.m-diag-block--ges .m-diag-bar[data-grade="B"] .m-diag-bar__fill { background: var(--ges-b); color: var(--text-body); }
.m-diag-block--ges .m-diag-bar[data-grade="C"] .m-diag-bar__fill { background: var(--ges-c); }
.m-diag-block--ges .m-diag-bar[data-grade="D"] .m-diag-bar__fill { background: var(--ges-d); }
.m-diag-block--ges .m-diag-bar[data-grade="E"] .m-diag-bar__fill { background: var(--ges-e); }
.m-diag-block--ges .m-diag-bar[data-grade="F"] .m-diag-bar__fill { background: var(--ges-f); }
.m-diag-block--ges .m-diag-bar[data-grade="G"] .m-diag-bar__fill { background: var(--ges-g); }
.m-diag-block--ges .m-diag-bar[data-grade="A"] .m-diag-bar__fill::after { border-left-color: var(--ges-a); }
.m-diag-block--ges .m-diag-bar[data-grade="B"] .m-diag-bar__fill::after { border-left-color: var(--ges-b); }
.m-diag-block--ges .m-diag-bar[data-grade="C"] .m-diag-bar__fill::after { border-left-color: var(--ges-c); }
.m-diag-block--ges .m-diag-bar[data-grade="D"] .m-diag-bar__fill::after { border-left-color: var(--ges-d); }
.m-diag-block--ges .m-diag-bar[data-grade="E"] .m-diag-bar__fill::after { border-left-color: var(--ges-e); }
.m-diag-block--ges .m-diag-bar[data-grade="F"] .m-diag-bar__fill::after { border-left-color: var(--ges-f); }
.m-diag-block--ges .m-diag-bar[data-grade="G"] .m-diag-bar__fill::after { border-left-color: var(--ges-g); }

/* Agency section (bottom of page) */
.m-agency {
  background: var(--bg-section);
  border-radius: var(--radius-card);
  padding: var(--space-md);
  box-shadow: var(--shadow-sm);
}
.m-agency__label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-label);
  margin-bottom: var(--space-sm);
}
.m-agency__header {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-sm);
}
.m-agency__logo {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-full);
  overflow: hidden;
  flex-shrink: 0;
}
.m-agency__logo svg { width: 100%; height: 100%; }
.m-agency__title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-heading);
}
.m-agency__title--sm { font-size: 16px; }
.m-agency__verified {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 11px;
  font-weight: 600;
  color: var(--badge-dpe-text);
  margin-top: 1px;
}
.m-agency__verified svg { width: 12px; height: 12px; }
.m-agency__tags {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-xs);
  margin-bottom: var(--space-sm);
}
.m-agency__tags .reassurance-tag { font-size: 11px; padding: 3px 8px; }
.m-agency__desc {
  font-size: 14px;
  font-weight: 300;
  color: var(--text-body);
  line-height: 22px;
  margin-bottom: var(--space-md);
}
.m-agency__grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}
.m-agency__grid-item {
  display: flex;
  align-items: flex-start;
  gap: var(--space-sm);
  font-size: 13px;
  color: var(--text-secondary);
}
.m-agency__grid-item svg {
  width: 15px;
  height: 15px;
  flex-shrink: 0;
  margin-top: 1px;
  color: var(--text-label);
}
.m-agency__grid-label {
  font-weight: 600;
  color: var(--text-heading);
  font-size: 12px;
  display: block;
}
.m-agency__rating {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding-top: var(--space-sm);
  border-top: 1px solid var(--border-default);
}
.m-agency__stars { display: flex; gap: 1px; }
.m-agency__stars svg { width: 14px; height: 14px; color: var(--color-star); }
.m-agency__rating-text { font-size: 13px; font-weight: 600; color: var(--text-heading); }
.m-agency__rating-count { font-size: 12px; color: var(--text-tertiary); }
.m-agency__minimal {
  font-size: 13px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: var(--space-xs);
}
.m-agency__minimal svg { width: 13px; height: 13px; color: var(--text-label); }

/* ============================================================
   BACK TO TOP
   ============================================================ */
.m-back-to-top {
  padding: var(--space-md) var(--gutter) var(--space-xl);
  text-align: center;
}
.m-back-to-top__link {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-tertiary);
  transition: color 0.15s;
}
.m-back-to-top__link:active { color: var(--primary-dark); }
.m-back-to-top__link svg {
  width: 14px;
  height: 14px;
}

/* ============================================================
   BOTTOM BAR — fixed CTA — prominent
   ============================================================ */
.m-bottom-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  z-index: 100;
  background: var(--bg-section);
  border-top: 1px solid var(--border-default);
  padding: var(--space-md) var(--space-md);
  padding-bottom: max(var(--space-md), env(safe-area-inset-bottom));
  box-shadow: var(--shadow-bar);
}
.m-bottom-bar__inner {
  display: flex;
  align-items: center;
}
.m-bottom-bar__agency {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  width: 50%;
  min-width: 0;
}
.m-bottom-bar__cta-wrap {
  width: 50%;
  display: flex;
  justify-content: center;
}
.m-bottom-bar__avatar {
  width: 34px;
  height: 34px;
  border-radius: var(--radius-full);
  overflow: hidden;
  flex-shrink: 0;
}
.m-bottom-bar__avatar svg { width: 100%; height: 100%; }
.m-bottom-bar__info { min-width: 0; }
.m-bottom-bar__name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-heading);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.m-bottom-bar__price {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-heading);
}
.m-bottom-bar__cta {
  padding: var(--space-sm) var(--space-md);
  border-radius: var(--radius-btn);
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  text-align: center;
  box-shadow: var(--shadow-lg);
  transition: transform 0.1s, background 0.15s;
}
.m-bottom-bar__cta:active { transform: scale(0.97); }

/* CTA tier-specific styles */
.btn-cta-premium {
  background: var(--primary-accent);
  color: var(--text-cta);
}
.btn-cta-premium:active { background: var(--btn-hover-premium); }
.btn-cta-gratuit {
  background: var(--primary-dark);
  color: white;
}
.btn-cta-gratuit:active { background: var(--btn-hover-gratuit); }
.btn-cta-scrape {
  background: var(--bg-page);
  border: 1.5px solid var(--border-default);
  color: var(--text-heading);
  box-shadow: var(--shadow-sm);
}
.btn-cta-scrape:active { background: var(--btn-hover-scrape); }

/* ============================================================
   BOTTOM SHEET
   ============================================================ */
.m-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.4);
}
.m-overlay.open { display: block; }
.m-sheet {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%;
  max-width: 430px;
  z-index: 201;
  background: var(--bg-section);
  border-radius: var(--radius-card-lg) var(--radius-card-lg) 0 0;
  padding: var(--space-md);
  padding-bottom: max(var(--space-lg), env(safe-area-inset-bottom));
  transition: transform 0.3s ease;
  max-height: 85vh;
  overflow-y: auto;
}
.m-sheet.open { transform: translateX(-50%) translateY(0); }
.m-sheet__handle {
  width: 36px;
  height: 4px;
  background: var(--border-divider);
  border-radius: 2px;
  margin: 0 auto var(--space-md);
}
.m-sheet__title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-heading);
  margin-bottom: 2px;
}
.m-sheet__subtitle {
  font-size: 13px;
  color: var(--text-tertiary);
  margin-bottom: var(--space-md);
}
.m-sheet__fields {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}
.m-sheet__field {
  width: 100%;
  padding: var(--space-md);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-btn-sm);
  font-size: 14px;
  font-family: inherit;
  background: var(--bg-section);
  outline: none;
}
.m-sheet__field:focus-visible { border-color: var(--primary-dark); }
.m-sheet__actions {
  display: flex;
  gap: var(--space-sm);
  align-items: stretch;
}
.m-sheet__submit {
  flex: 1;
  padding: var(--space-md);
  border-radius: var(--radius-btn-sm);
  font-size: 15px;
  font-weight: 700;
}
.m-sheet__call {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  flex-shrink: 0;
  border-radius: var(--radius-btn-sm);
  background: var(--primary-dark);
  transition: background 0.15s;
}
.m-sheet__call:active { background: var(--btn-hover-gratuit); }
.m-sheet__call svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: white;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.m-sheet__reassurance {
  font-size: 12px;
  color: var(--text-tertiary);
  text-align: center;
  margin-top: var(--space-xs);
}

/* Scrape sheet — notice + email + notify + alt */
.m-sheet__notice {
  display: flex;
  gap: var(--space-sm);
  align-items: flex-start;
  padding: var(--space-sm) var(--space-md);
  background: var(--bg-scrape-notice);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-card);
  margin-bottom: var(--space-md);
}
.m-sheet__notice-icon {
  width: 24px;
  height: 24px;
  border-radius: var(--radius-full);
  background: var(--color-warning);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.m-sheet__notice-icon svg { width: 12px; height: 12px; fill: white; }
.m-sheet__notice-text {
  font-size: 13px;
  line-height: 18px;
  color: var(--text-body);
}
.m-sheet__notify-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-sm);
  padding: var(--space-md);
  background: var(--bg-notify);
  border: 1px solid var(--border-divider);
  border-radius: var(--radius-card);
  font-size: 13px;
  font-weight: 700;
  color: var(--text-heading);
  cursor: pointer;
  margin-top: var(--space-sm);
}
.m-sheet__notify-btn svg { width: 15px; height: 15px; fill: var(--text-heading); }
.m-sheet__divider {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin: var(--space-md) 0;
  color: var(--text-label);
  font-size: 12px;
}
.m-sheet__divider::before,
.m-sheet__divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-divider);
}
.m-sheet__alt-card {
  background: var(--bg-premium);
  border: 1.5px solid var(--primary-accent);
  border-radius: var(--radius-card-lg);
  padding: var(--space-md);
}
.m-sheet__alt-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--primary-dark);
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  margin-bottom: var(--space-sm);
}
.m-sheet__alt-label svg { width: 12px; height: 12px; }
.m-sheet__alt-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--primary-dark);
  margin-bottom: var(--space-xs);
}
.m-sheet__alt-tag { margin-bottom: var(--space-sm); }
.m-sheet__alt-tag .reassurance-tag { font-size: 11px; padding: 3px 8px; }
.m-sheet__alt-cta {
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  background: var(--primary-accent);
  color: var(--text-cta);
  border: none;
  border-radius: var(--radius-btn);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.m-sheet__alt-cta:active { background: var(--btn-hover-premium); }

// ============================================================
// GALLERY — swipeable
// ============================================================
function renderGallery(ag) {
  currentPhoto = 0;
  const track = document.getElementById('galleryTrack');
  track.innerHTML = ag.photos.map(p => `<div class="m-gallery__slide"><img src="${p}" alt="Photo ${ag.name}" draggable="false"></div>`).join('');
  track.style.transform = 'translateX(0)';

  document.getElementById('mGalleryCount').textContent = `1 / ${ag.photos.length}`;

  const dotsEl = document.getElementById('mGalleryDots');
  dotsEl.innerHTML = '';
  // Show max 7 dots
  const maxDots = Math.min(ag.photos.length, 7);
  for (let i = 0; i < maxDots; i++) {
    const dot = document.createElement('span');
    dot.className = 'm-gallery__dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(dot);
  }
}

function goToPhoto(index) {
  const ag = agencies[selectedIndex];
  if (index < 0 || index >= ag.photos.length) return;
  currentPhoto = index;
  const track = document.getElementById('galleryTrack');
  track.style.transition = 'transform 0.3s ease';
  track.style.transform = `translateX(-${index * 100}%)`;
  document.getElementById('mGalleryCount').textContent = `${index + 1} / ${ag.photos.length}`;
  document.querySelectorAll('.m-gallery__dot').forEach((d, i) => d.classList.toggle('active', i === index));
}

// Touch swipe
const galleryEl = document.getElementById('mGallery');
galleryEl.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  isSwiping = true;
  document.getElementById('galleryTrack').style.transition = 'none';
}, { passive: true });

galleryEl.addEventListener('touchmove', (e) => {
  if (!isSwiping) return;
  touchDeltaX = e.touches[0].clientX - touchStartX;
  const offset = -(currentPhoto * 100) + (touchDeltaX / galleryEl.offsetWidth * 100);
  document.getElementById('galleryTrack').style.transform = `translateX(${offset}%)`;
}, { passive: true });

galleryEl.addEventListener('touchend', () => {
  if (!isSwiping) return;
  isSwiping = false;
  const threshold = galleryEl.offsetWidth * 0.2;
  const ag = agencies[selectedIndex];
  if (touchDeltaX < -threshold && currentPhoto < ag.photos.length - 1) {
    goToPhoto(currentPhoto + 1);
  } else if (touchDeltaX > threshold && currentPhoto > 0) {
    goToPhoto(currentPhoto - 1);
  } else {
    goToPhoto(currentPhoto); // snap back
  }
  touchDeltaX = 0;
});

      html += `<div class="m-diag-bar ${active ? 'active' : ''}" data-grade="${g}"><div class="m-diag-bar__fill">${g}</div>${active ? `<span class="m-diag-bar__marker">${value}</span>` : ''}</div>`;
    });

  }
  document.getElementById('mDiag').innerHTML = `
    <p class="m-diag__label">Diagnostic de performance</p>
    <div class="m-diag__container">
      ${scale(ag.dpe, ag.dpeValue, 'DPE \u2014 Consommation energetique', 'Consommation conventionnelle', '')}

// ============================================================

// ============================================================
function selectAgency(index) {
  if (index === selectedIndex) return;
  selectedIndex = index;
  const ag = agencies[index];

  renderSelector();
  renderGallery(ag);
  renderQuickView(ag);
  renderDescription(ag);
  renderCharacteristics(ag);
  renderDiagnostic(ag);
  renderAgencySection(ag);
  renderBottomBar(ag);

  // Stay at current scroll position — no scroll on agency switch
}
